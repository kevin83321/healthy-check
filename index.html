<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<title>健康評估問卷</title>

<link rel="stylesheet" href="style.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>


<body>

<div class="container">

<h1>健康評估問卷</h1>

<form id="healthForm">

<!-- STEP1 -->

<div class="step active" id="step1">

<h2>基本資料</h2>

姓名
<input type="text" id="name" required>

年齡
<input type="number" id="age">

身高(cm)
<input type="number" id="height">

體重(kg)
<input type="number" id="weight">

<div class="nav-buttons">

<div></div>

<button type="button" id="next1">
下一步
</button>

</div>

</div>



<!-- STEP2 -->

<div class="step" id="step2">

<h2>生活習慣</h2>

<label><input type="checkbox" id="lateSleep"> 經常熬夜</label>
<label><input type="checkbox" id="noExercise"> 很少運動</label>
<label><input type="checkbox" id="fastFood"> 常吃外食</label>
<label><input type="checkbox" id="lowWater"> 喝水不足</label>

<div class="nav-buttons">

<button type="button" class="secondary" id="back1">
返回
</button>

<button type="button" id="next2">
下一步
</button>

</div>

</div>



<!-- STEP3 -->

<div class="step" id="step3">

<h2>健康狀態</h2>

<label><input type="checkbox" id="fatigue"> 容易疲勞</label>
<label><input type="checkbox" id="insomnia"> 失眠</label>
<label><input type="checkbox" id="cramp"> 抽筋</label>
<label><input type="checkbox" id="constipation"> 便秘</label>
<label><input type="checkbox" id="headache"> 偏頭痛</label>

<div class="nav-buttons">

<button type="button" class="secondary" id="back2">
返回
</button>

<button type="submit">
產生健康分析
</button>

</div>

</div>

</form>



<!-- STEP4 結果頁 -->

<div class="step" id="step4">

<h2>健康分析結果</h2>

<div id="result"></div>

<h3>寄送完整報告</h3>

<input type="email" id="emailInput" placeholder="請輸入 Email">

<button id="sendEmailBtn">
寄送報告到 Email
</button>

<div id="emailStatus"></div>

</div>

</div>

<script src="scripts.js"></script>

</body>

</html>
