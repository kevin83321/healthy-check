<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<title>健康評估問卷</title>

<link rel="stylesheet" href="style.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>


<body>

<div class="container">

<h1>健康評估問卷</h1>

<form id="healthForm">

<!-- STEP1 -->

<div class="step active" id="step1">

<h2>基本資料</h2>

姓名
<input type="text" id="name" required>

年齡
<input type="number" id="age">

身高(cm)
<input type="number" id="height">

體重(kg)
<input type="number" id="weight">

<div class="nav-buttons">

<div></div>

<button type="button" id="next1">
下一步
</button>

</div>

</div>


<!-- STEP2 -->

<div class="step" id="step2">

<h2>生活習慣</h2>

<label><input type="checkbox" id="lateSleep"> 經常熬夜</label>
<label><input type="checkbox" id="noExercise"> 很少運動</label>
<label><input type="checkbox" id="fastFood"> 常吃外食</label>
<label><input type="checkbox" id="lowWater"> 喝水不足</label>

<div class="nav-buttons">

<button type="button" class="secondary" id="back1">
返回
</button>

<button type="button" id="next2">
下一步
</button>

</div>

</div>


<!-- STEP3 -->

<div class="step" id="step3">

<h2>健康狀態</h2>

<label><input type="checkbox" id="fatigue"> 容易疲勞</label>
<label><input type="checkbox" id="insomnia"> 失眠</label>
<label><input type="checkbox" id="cramp"> 抽筋</label>
<label><input type="checkbox" id="constipation"> 便秘</label>
<label><input type="checkbox" id="headache"> 偏頭痛</label>

<div class="nav-buttons">

<button type="button" class="secondary" id="back2">
返回
</button>

<button type="submit">
產生健康分析
</button>

</div>

</div>

</form>


<!-- STEP4 結果頁 -->

<div class="step" id="step4">

<h2>健康分析結果</h2>

<div id="result"></div>


<h3>寄送完整報告</h3>

<input type="email" id="emailInput" placeholder="請輸入 Email">

<button id="sendEmailBtn">
寄送報告到 Email
</button>

<div id="emailStatus"></div>

</div>

</div>



<script>

/* GAS API URL */

const GAS_URL = "YOUR_GOOGLE_APP_SCRIPT_URL";


/* Step 切換 */

function showStep(step){

$(".step").removeClass("active");

$(step).addClass("active");

}

$("#next1").click(()=>showStep("#step2"));

$("#back1").click(()=>showStep("#step1"));

$("#next2").click(()=>showStep("#step3"));

$("#back2").click(()=>showStep("#step2"));


/* 星星 */

function starRating(score){

let stars="";

for(let i=1;i<=5;i++){

if(i<=score){

stars+="<span class='star filled'>⭐</span>";

}else{

stars+="<span class='star'>☆</span>";

}

}

return stars;

}


/* 結果資料 */

let resultData={};


/* 問卷提交 */

$("#healthForm").submit(function(e){

e.preventDefault();

let b=0;
let calcium=0;
let gut=0;

if($("#fatigue").is(":checked")) b+=2;

if($("#insomnia").is(":checked")) b+=1;

if($("#cramp").is(":checked")) calcium+=2;

if($("#constipation").is(":checked")) gut+=3;

b=Math.min(b,5);
calcium=Math.min(calcium,5);
gut=Math.min(gut,5);

let weight=$("#weight").val();
let height=$("#height").val();

let bmi="--";

if(weight && height){

bmi=(weight / Math.pow(height/100,2)).toFixed(1);

}

/* 保存結果 */

resultData={

name:$("#name").val(),

bmi:bmi,

b:b,

calcium:calcium,

gut:gut

};


/* 顯示結果 */

$("#result").html(`

<div class="result-card">
<div class="score">BMI ${bmi}</div>
</div>

<div class="result-card">
B群需求
<div class="stars">${starRating(b)}</div>
</div>

<div class="result-card">
鈣需求
<div class="stars">${starRating(calcium)}</div>
</div>

<div class="result-card">
腸道需求
<div class="stars">${starRating(gut)}</div>
</div>

`);

showStep("#step4");

});


/* 發送 Email */

$("#sendEmailBtn").click(function(){

const email=$("#emailInput").val();

if(!email){

alert("請輸入Email");

return;

}

fetch(GAS_URL,{

method:"POST",

body:JSON.stringify({

action:"sendMail",

email:email,

result:resultData

})

})

.then(res=>res.text())

.then(()=>{

$("#emailStatus").html("✔ 報告已寄出");

});

});

</script>


</body>

</html>
